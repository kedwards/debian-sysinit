---
sysinit_debug: false
sysinit_force_update: false

sysinit_packages:
  - gcc
  - make
  - rsync
  - unzip
  - xclip
  - xsel
  - zip

sysinit_sys_tools: []
  # - mise

sysinit_mise_plugins:
  - amazon-ecr-credential-helper
  - awscli
  - bat
  - chezmoi
  - claude
  - eksctl
  - eza
  - fd
  - fzf
  - gemini-cli
  - git-worktree-wrapper
  - github-cli
  - go
  - granted
  - jq
  - kind
  - kubectl
  - lazydocker
  - minikube
  - localstack
  - mkcert
  - neovim
  - node
  - pre-commit
  - python
  - rclone
  - ripgrep
  - shellcheck
  - starship
  - task
  - usage
  - uv
  - zellij

sysinit_mise_custom_plugins:
  - plugin: "git-worktree-wrapper"
    src: "https://github.com/kedwards/asdf-git-worktree-wrapper.git"
