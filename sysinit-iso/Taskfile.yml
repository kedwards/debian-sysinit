---
version: "3"

vars:
  # ISO image for the installer
  ISO: debian-13.4.0-amd64-netinst.iso
  TEST_ISO: '{{.ISO | replace "amd64-netinst" "sysinit"}}'
  TEST_DISK: '{{.ISO | replace "amd64-netinst" "sysinit" | replace ".iso" ".qcow2"}}'
  KEEP_TEST_DISK: '{{.KEEP_TEST_DISK | default "0"}}'

  # Default user credentials
  USER_NAME: '{{.USER_NAME | default "devops"}}'
  USER_PASSWORD: '{{.USER_PASSWORD | default "devops"}}'
  SSH_PORT: '{{.SSH_PORT | default "2222"}}'
  SSH_PUB_KEY: '{{.SSH_PUB_KEY | default ""}}'

  # Display mode for QEMU
  # "gtk" for graphical
  # "none" for headless
  QEMU_DISPLAY: '{{.QEMU_DISPLAY | default "none"}}'

  # /dev/vda  = virtio (QEMU default)
  # /dev/sda  = bare metal SATA / IDE
  # /dev/nvme0n1 = NVMe
  INSTALL_DISK: /dev/vda

tasks:
  build:
    desc: Build the custom installer ISO
    run: always
    env:
      DISK: "{{.INSTALL_DISK}}"
      USER_NAME: "{{.USER_NAME}}"
      USER_PASSWORD: "{{.USER_PASSWORD}}"
    cmds:
      - bash scripts/build.sh

  clean:
    desc: Remove the disk image and extracted installer files
    cmds:
      - rm -f {{.TEST_DISK}} {{.TEST_ISO}}
      - rm -f {{.DISK}}
  manual-test:
    desc: Install the ISO to a persistent disk and boot for manual SSH login
    deps: [build]
    env:
      TEST_ISO: "{{.TEST_ISO}}"
      TEST_DISK: "{{.TEST_DISK}}"
      SSH_PORT: "{{.SSH_PORT}}"
      SSH_USER: "{{.USER_NAME}}"
      QEMU_DISPLAY: "gtk"
    cmds:
      - bash scripts/manual-test.sh

  test:
    desc: Run the automated install + first-boot bootstrap assertion suite
    deps: [clean, build]
    env:
      TEST_ISO: "{{.TEST_ISO}}"
      TEST_DISK: "{{.TEST_DISK}}"
      SSH_PORT: "{{.SSH_PORT}}"
      SSH_USER: "{{.USER_NAME}}"
      QEMU_DISPLAY: "{{.QEMU_DISPLAY}}"
      KEEP_TEST_DISK: "{{.KEEP_TEST_DISK}}"
    cmds:
      - bash scripts/test.sh
